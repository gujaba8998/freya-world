<script>
// Suppress browser-extension (wallet) promise rejections before they hit console
(function(){
  var _ce = console.error.bind(console);
  console.error = function(){
    var s = Array.prototype.join.call(arguments,' ');
    if(s.indexOf('chrome-extension')>-1||s.indexOf('ankr')>-1||s.indexOf('ethereum')>-1) return;
    _ce.apply(console, arguments);
  };
  window.addEventListener('error', function(e){
    var src = (e.filename || '') + ' ' + String(e.message || '');
    if (/chrome-extension|ankr|ethereum/i.test(src)) { e.preventDefault(); return false; }
  }, true);
  window.addEventListener('unhandledrejection', function(e){
    var r = e.reason;
    // suppress extension/wallet noise: real app code only ever rejects with Error
    // instances (and always .catch()s them) — anything else is injected by a
    // browser extension racing to patch window.ethereum, etc.
    if (!(r instanceof Error) || /chrome-extension|ankr|ethereum/i.test(String(r.stack || r.message || ''))) {
      e.preventDefault();
    }
  }, true);
})();
</script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "confetti": true,
  "thaiDate": true
}/*EDITMODE-END*/;

// Catches any crash in the app tree and shows a friendly message instead of
// a blank white screen. Does NOT fix the underlying bug — it just makes
// failures visible and recoverable instead of silent. If this ever shows up,
// it means something crashed; check the browser console (F12) for the real
// error and send it to whoever maintains this app.
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, message: '' }; }
  static getDerivedStateFromError(err) { return { hasError: true, message: err && err.message ? err.message : String(err) }; }
  componentDidCatch(err, info) { console.error('FreyaApp crashed:', err, info); }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{
          minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center',
          justifyContent: 'center', gap: 14, padding: 24, textAlign: 'center',
          fontFamily: "'Fredoka', sans-serif", background: '#fff0f6', color: '#5b3a52',
        }}>
          <div style={{ fontSize: 44 }}>🛠️</div>
          <div style={{ fontSize: 17, fontWeight: 700 }}>มีบางอย่างผิดพลาด</div>
          <div style={{ fontSize: 13, opacity: .8, maxWidth: 320 }}>
            บอกคุณแม่/คนดูแลแอปด้วยนะ — ลองกดปุ่มด้านล่างเพื่อโหลดใหม่อีกครั้ง
          </div>
          <button onClick={() => window.location.reload()}
            style={{ padding: '10px 22px', borderRadius: 999, border: 'none', background: '#ff6fa5', color: '#fff', fontWeight: 700, fontSize: 14, cursor: 'pointer' }}>
            โหลดหน้าใหม่
          </button>
          <div style={{ fontSize: 10.5, opacity: .5, marginTop: 6 }}>({this.state.message})</div>
        </div>
      );
    }
    return this.props.children;
  }
}

function Page() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const settings = { confetti: t.confetti, thaiDate: t.thaiDate };
  return (
    <ErrorBoundary>
      <FreyaApp variant="bubble" settings={settings} />
      <TweaksPanel>
        <TweakSection label="ตั้งค่า · Settings" />
        <TweakToggle label="Confetti on complete" value={t.confetti}
          onChange={v => setTweak('confetti', v)} />
        <TweakToggle label="Thai / Buddhist date" value={t.thaiDate}
          onChange={v => setTweak('thaiDate', v)} />
      </TweaksPanel>
    </ErrorBoundary>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>

<script>
// PWA: service worker needs https (or localhost) — silently skipped on file://
if ('serviceWorker' in navigator &&
    (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').catch(function (e) { console.error('SW register:', e); });
  });
}
</script>
